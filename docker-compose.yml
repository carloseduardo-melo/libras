version: '3.8'

services:
  app:
    build: .
    image: libras-app:latest
    ports:
      - "8000:80"
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
