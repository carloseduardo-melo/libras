server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # JS/CSS gerados pelo Gatsby têm hash no nome: cache de 1 ano
    location ~* \.(js|css|woff|woff2|ttf|eot|webp|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SVGs e manifest
    location ~* \.(svg|webmanifest)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # page-data do Gatsby (JSON de rotas)
    location ^~ /page-data/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # HTML: sem cache para garantir atualizações
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
